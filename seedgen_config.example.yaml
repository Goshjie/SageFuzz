# Copy this file to `seedgen_config.yaml` and fill in your API key.
#
# NOTE: `seedgen_config.yaml` is gitignored to avoid accidentally committing secrets.

model:
  # OpenAI-like model id (Volc Ark example from seed_agno_test.py / README)
  # 字节
  model_id: kimi-k2.5
  base_url: https://ark.cn-beijing.volces.com/api/coding/v3
  api_key: "4e9e091c-c1a1-4f97-9d38-80147e9b2762"
  # 阿里 coding plan
  base_url: https://coding.dashscope.aliyuncs.com/v1
  api_key: "sk-sp-20c3eb67f9f442c4bee32874902608e6"
  # gpt
  model_id: gpt-5.4
  base_url: https://codex-api.packycode.com/v1
  api_key: "sk-APNVH43wyE6McPaNR5Z9FBVmGJEQgpB4"
  # right code
  model_id: gpt-5.4
  base_url: https://right.codes/codex/v1
  api_key: "sk-8316bfeece654d87b8f0c81acca68ff3"
  # Optional model transport settings for unstable networks.
  timeout_seconds: 120
  max_retries: 3

# Optional: override model config for selected agents.
# `all_agents` can be used for a full small-model baseline.
# Individual agent keys override `all_agents` when both are present.
#
# Example experiment layouts:
# 1) Only Agent5 small model:
# agent_models:
#   agent5:
#     model_id: qwen2.5-7b-instruct
#     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#     api_key: ${DASHSCOPE_API_KEY}
#
# 2) All agents small model baseline:
# agent_models:
#   all_agents:
#     model_id: qwen2.5-7b-instruct
#     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#     api_key: ${DASHSCOPE_API_KEY}
#
# Supported per-agent keys include:
# - agent1 / semantic_analyzer
# - agent2 / sequence_constructor
# - agent3 / constraint_critic
# - agent4 / entity_generator
# - agent5 / entity_critic
# - agent6 / oracle_predictor

# Required: user intent (this system is intent-driven)
intent:
  feature_under_test: "Stateful firewall directional TCP"
  intent_text: "Only allow internal h1 to initiate TCP to external h3; h3 may only reply, and must not initiate."
  internal_host: "h1"
  external_host: "h3"
  include_negative_external_initiation: true

# Optional overrides (CLI defaults are used if omitted)
run:
  max_retries: 4

memory:
  enabled: true
  db_path: runs/agno_memory.db
  user_id: sagefuzz-local-user
  update_memory_on_run: true
  add_memories_to_context: true
  enable_session_summaries: false
  add_session_summary_to_context: false

paths:
  bmv2_json: P4/firewall/build/firewall.json
  graphs_dir: P4/firewall/build/graphs
  p4info: P4/firewall/build/firewall.p4.p4info.txtpb
  topology: P4/firewall/pod-topo/topology.json
  p4_source: P4/firewall/solution/firewall.p4
